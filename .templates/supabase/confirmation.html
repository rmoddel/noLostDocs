<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#e7ebf1;font-family:IBM Plex Sans,Inter,'Segoe UI',Arial,sans-serif;color:#16181d;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#e7ebf1;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:linear-gradient(180deg,#fdfefe 0%,#eef2f7 100%);border:1px solid rgba(22,24,29,0.10);border-radius:28px;box-shadow:0 20px 60px rgba(22,24,29,0.12);overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 18px;border-bottom:1px solid rgba(22,24,29,0.08);background:linear-gradient(135deg,rgba(255,255,255,0.96),rgba(231,236,243,0.88));">
                <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#b46b57;font-weight:700;margin-bottom:10px;">NoLostDocs</div>
                <div style="font-family:Sora,IBM Plex Sans,Inter,'Segoe UI',Arial,sans-serif;font-size:28px;line-height:1.1;font-weight:700;color:#16181d;">Confirm your account</div>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 32px 16px;">
                <p style="margin:0 0 16px;font-size:16px;line-height:1.7;color:rgba(22,24,29,0.82);">
                  Confirm this email address to finish setting up your NoLostDocs account.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:0 0 24px;">
                  <tr>
                    <td align="center" bgcolor="#16181d" style="border-radius:16px;background:linear-gradient(180deg,#2a303a 0%,#16181d 100%);box-shadow:0 14px 30px rgba(22,24,29,0.20);">
                      <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email&redirect_to={{ .RedirectTo }}" style="display:inline-block;padding:15px 24px;font-size:15px;font-weight:700;line-height:1;color:#ffffff;text-decoration:none;border-radius:16px;">
                        Confirm email address
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:13px;line-height:1.7;color:rgba(22,24,29,0.62);">
                  If you did not create this account, you can ignore this email.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
