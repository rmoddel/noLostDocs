version: 1
applications:
  - appRoot: apps
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build -w @nolostdocs/web
      artifacts:
        baseDirectory: apps/.next
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
          - apps/.next/cache/**/*
          - packages/*/node_modules/**/*
