<!doctype html>
<html><head><meta charset="utf-8"><title>NoLostDocs Asset Preview</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f1ea;color:#231d1b}
main{max-width:1100px;margin:0 auto;padding:40px 24px}
section{background:white;border:1px solid rgba(35,29,27,.12);border-radius:24px;padding:28px;margin:24px 0}
img{max-width:100%;height:auto}
span{color:#a95d4d}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.tile{background:#f7f1ea;border-radius:16px;padding:18px}
</style></head>
<body><main>
<h1>No<span>Lost</span>Docs Asset Preview</h1>
<section><h2>Horizontal Logo</h2><img src="logos/nolostdocs-logo-horizontal-trimmed.png"></section>
<section><h2>Icon</h2><img src="logos/nolostdocs-icon-trimmed.png" style="max-width:380px"></section>
<section><h2>OG / Unfurl</h2><img src="unfurl/og-image.png"></section>
<section><h2>Icons</h2><div class="grid">
<div class="tile"><img src="icons/favicon-32x32.png"> favicon 32</div>
<div class="tile"><img src="icons/apple-touch-icon.png" style="width:90px"> apple touch</div>
<div class="tile"><img src="icons/android-chrome-192x192.png" style="width:90px"> android 192</div>
<div class="tile"><img src="icons/maskable-icon-512x512.png" style="width:90px"> maskable 512</div>
</div></section>
</main></body></html>
